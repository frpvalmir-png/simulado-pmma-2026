<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Simulado PMMA 2026</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#0f172a;color:#fff}
.app{max-width:760px;margin:0 auto;padding:16px}
.top{position:sticky;top:0;background:#0f172a;padding:10px 0 14px;z-index:5}
h1{font-size:22px;margin:0 0 6px}
.muted{color:#94a3b8;font-size:14px}
.bar{height:10px;background:#1e293b;border-radius:999px;overflow:hidden;margin:12px 0 8px}
.bar>div{height:100%;background:#facc15;width:4%;transition:.2s}
.info{display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#94a3b8}
.card{background:#111827;border:1px solid #334155;border-radius:18px;padding:18px;margin-top:14px}
.subject{display:inline-block;background:#1e293b;color:#facc15;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800}
.question{font-size:18px;line-height:1.55;margin:18px 0}
.options{display:grid;gap:10px}
.option,.navbtn,.finish,.jump,.restart{appearance:none;-webkit-appearance:none;border:0;font:inherit;cursor:pointer;touch-action:manipulation}
.option{padding:16px;border-radius:14px;background:#172033;color:#fff;border:1px solid #334155;text-align:left;font-weight:800}
.option.selected{border:2px solid #facc15;background:#332f12}
.nav{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.navbtn{padding:15px;border-radius:14px;font-weight:800}
.prev{background:#334155;color:#fff}
.next{background:#facc15;color:#111827}
.finish{width:100%;margin-top:10px;padding:15px;border-radius:14px;background:#22c55e;color:#052e16;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:16px}
.jump{padding:10px 0;border-radius:10px;background:#172033;color:#fff;border:1px solid #334155}
.jump.answered{background:#3a3211;color:#fde68a;border-color:#7c6a13}
.jump.current{outline:2px solid #facc15}
#result{display:none}
.score{font-size:34px;font-weight:900;color:#facc15;margin:12px 0}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.stat{background:#172033;border-radius:12px;padding:12px;text-align:center}
.stat b{display:block;font-size:22px}
.row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #334155;font-size:14px}
.review{background:#172033;border-radius:12px;padding:12px;margin-top:10px;font-size:14px;line-height:1.45}
.ok{color:#22c55e}.bad{color:#ef4444}.blank{color:#94a3b8}
.restart{width:100%;margin-top:16px;padding:15px;border-radius:14px;background:#facc15;color:#111827;font-weight:900}
@media(min-width:560px){.options{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1>Simulado PMMA 2026</h1>
    <div class="muted">25 itens • Cebraspe • +1 acerto • −1 erro • 0 em branco</div>
    <div class="bar"><div id="progress"></div></div>
    <div class="info"><span id="counter"></span><span id="answeredCount"></span></div>
  </div>

  <div id="quiz" class="card">
    <span id="subject" class="subject"></span>
    <div id="question" class="question"></div>

    <div class="options">
      <button type="button" class="option" data-answer="C">CERTO</button>
      <button type="button" class="option" data-answer="E">ERRADO</button>
      <button type="button" class="option" data-answer="B">EM BRANCO</button>
    </div>

    <div class="nav">
      <button type="button" id="prevBtn" class="navbtn prev">Anterior</button>
      <button type="button" id="nextBtn" class="navbtn next">Próxima</button>
    </div>

    <button type="button" id="finishBtn" class="finish">Finalizar e corrigir</button>
    <div id="grid" class="grid"></div>
  </div>

  <div id="result" class="card">
    <span class="subject">RESULTADO FINAL</span>
    <div id="score" class="score"></div>
    <div id="message"></div>
    <div class="stats">
      <div class="stat"><b id="hits">0</b>Acertos</div>
      <div class="stat"><b id="misses">0</b>Erros</div>
      <div class="stat"><b id="blanks">0</b>Brancos</div>
    </div>
    <div id="bySubject"></div>
    <div id="review"></div>
    <button type="button" id="restartBtn" class="restart">Refazer simulado</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const questions = [{"subject": "Língua Portuguesa", "text": "No trecho “Embora a atuação policial exija preparo técnico, o compromisso com a sociedade constitui elemento igualmente indispensável ao exercício da função”, a substituição de “Embora” por “Ainda que” preserva o sentido e a correção gramatical.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "Na frase “Os policiais, que participaram da operação, foram homenageados”, as vírgulas indicam que todos os policiais mencionados participaram da operação.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "Na oração “Fazem dois anos que o curso foi concluído”, a forma verbal “Fazem” está empregada corretamente de acordo com a norma-padrão.", "answer": "E"}, {"subject": "Língua Portuguesa", "text": "Em “A população assistiu à cerimônia”, o emprego do sinal indicativo de crase está de acordo com a norma-padrão.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "A substituição de “porque” por “por que” em “O candidato faltou porque estava doente” manteria a correção gramatical e o mesmo sentido.", "answer": "E"}, {"subject": "História do Brasil", "text": "A Revolução de 1930 marcou o fim da chamada República Velha e levou Getúlio Vargas ao poder.", "answer": "C"}, {"subject": "História do Brasil", "text": "A Constituição brasileira de 1946 foi promulgada durante o Estado Novo e ampliou os poderes ditatoriais do Executivo.", "answer": "E"}, {"subject": "História do Brasil", "text": "O governo de Juscelino Kubitschek ficou associado a uma política de industrialização e ao Plano de Metas.", "answer": "C"}, {"subject": "História do Maranhão", "text": "A França Equinocial esteve relacionada à presença francesa no Maranhão e à fundação de São Luís.", "answer": "C"}, {"subject": "História do Maranhão", "text": "A Balaiada foi um movimento ocorrido no período imperial, com forte participação de camadas populares no Maranhão.", "answer": "C"}, {"subject": "História do Maranhão", "text": "A Revolta de Bequimão teve relação com conflitos envolvendo a Companhia de Comércio do Maranhão e o descontentamento de colonos.", "answer": "C"}, {"subject": "Geografia do Brasil", "text": "A industrialização brasileira contribuiu para a intensificação da urbanização e para o crescimento das grandes metrópoles.", "answer": "C"}, {"subject": "Geografia do Brasil", "text": "A expansão das fronteiras agrícolas no Brasil ocorreu exclusivamente na faixa litorânea e não alcançou o Centro-Oeste nem a Amazônia.", "answer": "E"}, {"subject": "Geografia do Brasil", "text": "Os movimentos migratórios internos alteram a distribuição espacial da população brasileira e podem ser influenciados por fatores econômicos.", "answer": "C"}, {"subject": "Geografia do Maranhão", "text": "Os rios Parnaíba, Gurupi e Tocantins-Araguaia aparecem no conteúdo programático como bacias de rios limítrofes do Maranhão.", "answer": "C"}, {"subject": "Geografia do Maranhão", "text": "Cerrado, floresta e cocais estão entre as principais formações vegetais estudadas na geografia maranhense.", "answer": "C"}, {"subject": "Geografia do Maranhão", "text": "O conteúdo de Geografia do Maranhão exclui temas como portos, aeroportos, malha viária e setor terciário.", "answer": "E"}, {"subject": "Raciocínio Lógico", "text": "A negação da proposição “Todos os candidatos foram aprovados” é “Nenhum candidato foi aprovado”.", "answer": "E"}, {"subject": "Raciocínio Lógico", "text": "Se uma proposição simples p é verdadeira, então a negação ¬p é falsa.", "answer": "C"}, {"subject": "Raciocínio Lógico", "text": "Pelas Leis de Morgan, a negação de “p e q” é logicamente equivalente a “não p ou não q”.", "answer": "C"}, {"subject": "Legislação Institucional", "text": "Entre as normas indicadas no conteúdo de Legislação Institucional está a Lei estadual nº 6.513/1995, referente ao Estatuto dos Policiais Militares do Estado do Maranhão.", "answer": "C"}, {"subject": "Legislação Institucional", "text": "A Lei Federal nº 14.751/2023 aparece no conteúdo programático como Lei Orgânica Nacional das Polícias Militares e dos Corpos de Bombeiros Militares.", "answer": "C"}, {"subject": "Noções de Informática", "text": "Windows e Linux são exemplos de sistemas operacionais contemplados no conteúdo programático do edital-base.", "answer": "C"}, {"subject": "Noções de Informática", "text": "Firewall, antivírus e antispyware são ferramentas associadas à segurança da informação.", "answer": "C"}, {"subject": "Noções de Informática", "text": "Computação em nuvem e armazenamento de dados na nuvem não fazem parte dos tópicos previstos em Noções de Informática.", "answer": "E"}];
  let current = 0;
  let answers = new Array(questions.length).fill(null);

  const el = id => document.getElementById(id);

  function render(){
    const q = questions[current];
    el("subject").textContent = q.subject;
    el("question").textContent = q.text;
    el("counter").textContent = "Questão " + (current+1) + " de " + questions.length;
    el("answeredCount").textContent = answers.filter(Boolean).length + " respondidas";
    el("progress").style.width = (((current+1)/questions.length)*100) + "%";

    document.querySelectorAll(".option").forEach(btn=>{
      btn.classList.toggle("selected", btn.dataset.answer === answers[current]);
    });

    el("prevBtn").disabled = current === 0;
    el("prevBtn").style.opacity = current === 0 ? ".45" : "1";
    el("nextBtn").textContent = current === questions.length-1 ? "Ir ao início" : "Próxima";

    renderGrid();
  }

  function renderGrid(){
    const grid = el("grid");
    grid.innerHTML = "";
    questions.forEach((q,i)=>{
      const b = document.createElement("button");
      b.type = "button";
      b.className = "jump" + (answers[i] ? " answered" : "") + (i===current ? " current" : "");
      b.textContent = i+1;
      b.addEventListener("click", function(){ current=i; render(); });
      grid.appendChild(b);
    });
  }

  document.querySelectorAll(".option").forEach(btn=>{
    btn.addEventListener("click", function(){
      answers[current] = this.dataset.answer;
      render();
    });
  });

  el("prevBtn").addEventListener("click", function(){
    if(current > 0){ current--; render(); }
  });

  el("nextBtn").addEventListener("click", function(){
    if(current < questions.length-1){ current++; }
    else { current = 0; }
    render();
  });

  el("finishBtn").addEventListener("click", function(){
    let hits=0, misses=0, blanks=0;
    const by={};

    questions.forEach((q,i)=>{
      const a = answers[i] || "B";
      if(!by[q.subject]) by[q.subject]={a:0,e:0,b:0};
      if(a==="B"){ blanks++; by[q.subject].b++; }
      else if(a===q.answer){ hits++; by[q.subject].a++; }
      else { misses++; by[q.subject].e++; }
    });

    const score = hits - misses;
    el("score").textContent = score + " pontos líquidos";
    el("hits").textContent = hits;
    el("misses").textContent = misses;
    el("blanks").textContent = blanks;

    let msg = "Resultado diagnóstico.";
    if(score >= 18) msg = "Excelente desempenho.";
    else if(score >= 12) msg = "Bom desempenho, com espaço para evolução.";
    else if(score >= 6) msg = "Desempenho intermediário: reforce os pontos fracos.";
    el("message").textContent = msg;

    let html = "<h3>Desempenho por matéria</h3>";
    Object.keys(by).forEach(s=>{
      const v=by[s], net=v.a-v.e;
      html += '<div class="row"><span>'+s+'</span><strong>'+net+' pts • '+v.a+'A / '+v.e+'E / '+v.b+'B</strong></div>';
    });
    el("bySubject").innerHTML = html;

    let rev = "<h3>Revisão das questões</h3>";
    questions.forEach((q,i)=>{
      const a = answers[i] || "B";
      const cls = a==="B" ? "blank" : (a===q.answer ? "ok" : "bad");
      const label = a==="B" ? "Em branco" : (a===q.answer ? "Acertou" : "Errou");
      rev += '<div class="review"><b>'+(i+1)+'. '+q.subject+'</b><br>'+q.text+'<br><span class="'+cls+'"><b>'+label+'</b> — Sua resposta: '+a+' | Gabarito: '+q.answer+'</span></div>';
    });
    el("review").innerHTML = rev;

    el("quiz").style.display = "none";
    el("result").style.display = "block";
    window.scrollTo(0,0);
  });

  el("restartBtn").addEventListener("click", function(){
    current=0;
    answers=new Array(questions.length).fill(null);
    el("result").style.display="none";
    el("quiz").style.display="block";
    render();
    window.scrollTo(0,0);
  });

  render();
})();
</script>
</body>
</html>
