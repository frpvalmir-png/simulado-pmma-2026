ween;gap:10px;padding:10px 0;border-bottom:1px solid #334155;font-size:14px}.review{background:#172033;border-radius:12px;padding:12px;margin-top:10px;font-size:14px;line-height:1.45}.review .q{white-space:pre-line;margin:6px 0}.ok{color:#22c55e}.bad{color:#ef4444}.blank{color:#94a3b8}.restart{width:100%;padding:15px;margin-top:16px;background:#facc15;color:#111827}@media(min-width:560px){.options{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:repeat(10,1fr)}}

</div><script>
const questions=[{"subject": "Língua Portuguesa", "text": "TEXTO 1 — “A atividade policial exige preparo técnico, equilíbrio emocional e capacidade de decisão. Em situações de risco, agir com rapidez não significa agir de forma precipitada. O profissional bem preparado avalia o cenário, identifica prioridades e atua de maneira proporcional às circunstâncias.”\n\nO texto sustenta que rapidez e precipitação são comportamentos equivalentes em situações de risco.", "answer": "E"}, {"subject": "Língua Portuguesa", "text": "TEXTO 1 — “A atividade policial exige preparo técnico, equilíbrio emocional e capacidade de decisão. Em situações de risco, agir com rapidez não significa agir de forma precipitada. O profissional bem preparado avalia o cenário, identifica prioridades e atua de maneira proporcional às circunstâncias.”\n\nSegundo o texto, a boa atuação profissional depende, entre outros fatores, da capacidade de avaliar o cenário antes de agir.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "TEXTO 1 — “A atividade policial exige preparo técnico, equilíbrio emocional e capacidade de decisão. Em situações de risco, agir com rapidez não significa agir de forma precipitada. O profissional bem preparado avalia o cenário, identifica prioridades e atua de maneira proporcional às circunstâncias.”\n\nNo trecho “não significa agir de forma precipitada”, a palavra “precipitada” poderia ser substituída por “apressada”, sem alteração relevante do sentido.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "TEXTO 1 — “A atividade policial exige preparo técnico, equilíbrio emocional e capacidade de decisão. Em situações de risco, agir com rapidez não significa agir de forma precipitada. O profissional bem preparado avalia o cenário, identifica prioridades e atua de maneira proporcional às circunstâncias.”\n\nA vírgula empregada após “Em situações de risco” é facultativa, pois separa um adjunto adverbial deslocado de pequena extensão.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "TEXTO 1 — “A atividade policial exige preparo técnico, equilíbrio emocional e capacidade de decisão. Em situações de risco, agir com rapidez não significa agir de forma precipitada. O profissional bem preparado avalia o cenário, identifica prioridades e atua de maneira proporcional às circunstâncias.”\n\nA substituição de “às circunstâncias” por “as circunstâncias” manteria a correção gramatical do período.", "answer": "E"}, {"subject": "Língua Portuguesa", "text": "TEXTO 2 — “Uma instituição pública se fortalece quando a confiança da sociedade é preservada. Essa confiança não se constrói apenas por discursos, mas sobretudo por ações coerentes, transparentes e responsáveis. Por isso, cada conduta individual pode contribuir para fortalecer ou enfraquecer a imagem institucional.”\n\nO texto defende que a imagem institucional depende exclusivamente da comunicação oficial da instituição.", "answer": "E"}, {"subject": "Língua Portuguesa", "text": "TEXTO 2 — “Uma instituição pública se fortalece quando a confiança da sociedade é preservada. Essa confiança não se constrói apenas por discursos, mas sobretudo por ações coerentes, transparentes e responsáveis. Por isso, cada conduta individual pode contribuir para fortalecer ou enfraquecer a imagem institucional.”\n\nA expressão “Por isso” introduz uma relação de conclusão em relação às ideias apresentadas anteriormente.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "TEXTO 2 — “Uma instituição pública se fortalece quando a confiança da sociedade é preservada. Essa confiança não se constrói apenas por discursos, mas sobretudo por ações coerentes, transparentes e responsáveis. Por isso, cada conduta individual pode contribuir para fortalecer ou enfraquecer a imagem institucional.”\n\nO pronome “Essa”, em “Essa confiança”, retoma a confiança da sociedade mencionada no período anterior.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "TEXTO 2 — “Uma instituição pública se fortalece quando a confiança da sociedade é preservada. Essa confiança não se constrói apenas por discursos, mas sobretudo por ações coerentes, transparentes e responsáveis. Por isso, cada conduta individual pode contribuir para fortalecer ou enfraquecer a imagem institucional.”\n\nA retirada da vírgula após “Por isso” manteria obrigatoriamente a pontuação correta segundo a norma-padrão.", "answer": "E"}, {"subject": "Língua Portuguesa", "text": "TEXTO 2 — “Uma instituição pública se fortalece quando a confiança da sociedade é preservada. Essa confiança não se constrói apenas por discursos, mas sobretudo por ações coerentes, transparentes e responsáveis. Por isso, cada conduta individual pode contribuir para fortalecer ou enfraquecer a imagem institucional.”\n\nNo trecho “pode contribuir para fortalecer ou enfraquecer”, a forma verbal “pode” concorda com o núcleo do sujeito “conduta”.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "Na frase “Faz três anos que o candidato iniciou sua preparação”, o verbo “fazer” está corretamente empregado no singular por indicar tempo decorrido.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "Na oração “Os agentes assistiram à solenidade”, o emprego do sinal indicativo de crase está de acordo com a norma-padrão.", "answer": "C"}, {"subject": "Língua Portuguesa", "text": "Na frase “Houveram muitos candidatos no local de prova”, a concordância verbal está correta.", "answer": "E"}, {"subject": "Língua Portuguesa", "text": "Em “Os candidatos que estudaram com regularidade tiveram melhor desempenho”, a oração iniciada por “que” restringe o grupo de candidatos mencionado.", "answer": "C"}, {"subject": "História do Brasil", "text": "A Revolução de 1930 encerrou a República Velha e levou Getúlio Vargas ao poder.", "answer": "C"}, {"subject": "História do Brasil", "text": "Durante o Estado Novo, o Brasil viveu um regime democrático marcado por ampla liberdade partidária.", "answer": "E"}, {"subject": "História do Brasil", "text": "A Constituição de 1946 esteve associada ao processo de redemocratização do país após o fim do Estado Novo.", "answer": "C"}, {"subject": "História do Brasil", "text": "O governo Juscelino Kubitschek adotou uma política de incentivo à industrialização e ficou associado ao Plano de Metas.", "answer": "C"}, {"subject": "História do Brasil", "text": "O golpe de 1964 deu início a um período de regime militar no Brasil.", "answer": "C"}, {"subject": "História do Brasil", "text": "A crise do regime militar brasileiro não teve relação com o processo de redemocratização posterior.", "answer": "E"}, {"subject": "História do Brasil", "text": "As Constituições brasileiras e a organização do Estado integram temas relacionados à formação política do Brasil contemporâneo.", "answer": "C"}, {"subject": "História do Maranhão", "text": "A França Equinocial esteve relacionada à presença francesa no Maranhão no início do século XVII.", "answer": "C"}, {"subject": "História do Maranhão", "text": "A fundação de São Luís está historicamente ligada à presença francesa no Maranhão.", "answer": "C"}, {"subject": "História do Maranhão", "text": "A Batalha de Guaxenduba ocorreu no contexto de disputas pelo controle do Maranhão.", "answer": "C"}, {"subject": "História do Maranhão", "text": "A Revolta de Bequimão esteve ligada a conflitos envolvendo colonos e a Companhia de Comércio do Maranhão.", "answer": "C"}, {"subject": "História do Maranhão", "text": "A Balaiada ocorreu no período republicano e foi liderada exclusivamente por grandes proprietários rurais.", "answer": "E"}, {"subject": "História do Maranhão", "text": "A adesão do Maranhão à Independência do Brasil ocorreu sem conflitos ou resistências locais relevantes.", "answer": "E"}, {"subject": "História do Maranhão", "text": "A Revolução de 1930 também produziu repercussões políticas no Maranhão.", "answer": "C"}, {"subject": "Geografia do Brasil", "text": "A industrialização brasileira contribuiu para a expansão urbana e para o crescimento de grandes metrópoles.", "answer": "C"}, {"subject": "Geografia do Brasil", "text": "A rede de transportes brasileira possui relação com a integração econômica do território nacional.", "answer": "C"}, {"subject": "Geografia do Brasil", "text": "A expansão da fronteira agrícola brasileira não alcançou o Centro-Oeste nem a Amazônia.", "answer": "E"}, {"subject": "Geografia do Brasil", "text": "Os movimentos migratórios internos podem ser influenciados por oportunidades de emprego e mudanças econômicas regionais.", "answer": "C"}, {"subject": "Geografia do Brasil", "text": "A distribuição da população brasileira pelo território é completamente homogênea.", "answer": "E"}, {"subject": "Geografia do Brasil", "text": "A estrutura fundiária está relacionada à distribuição e à concentração da propriedade da terra.", "answer": "C"}, {"subject": "Geografia do Brasil", "text": "O aproveitamento, o desperdício e a conservação dos recursos naturais fazem parte do debate geográfico sobre o território brasileiro.", "answer": "C"}, {"subject": "Geografia do Maranhão", "text": "O estudo geográfico do Maranhão inclui seus limites territoriais, pontos extremos e áreas de proteção ambiental.", "answer": "C"}, {"subject": "Geografia do Maranhão", "text": "Os rios Parnaíba, Gurupi e Tocantins-Araguaia aparecem no conteúdo programático associados a bacias limítrofes do Maranhão.", "answer": "C"}, {"subject": "Geografia do Maranhão", "text": "Floresta, cerrado e cocais estão entre as formações vegetais estudadas no território maranhense.", "answer": "C"}, {"subject": "Geografia do Maranhão", "text": "A geografia do Maranhão exclui o estudo de agricultura, pecuária e extrativismo.", "answer": "E"}, {"subject": "Geografia do Maranhão", "text": "Portos, aeroportos e malha viária estão entre os temas relacionados à infraestrutura do Maranhão.", "answer": "C"}, {"subject": "Geografia do Maranhão", "text": "A cultura maranhense aparece no conteúdo programático da disciplina.", "answer": "C"}, {"subject": "Geografia do Maranhão", "text": "O setor terciário compreende atividades como comércio, transportes e telecomunicações.", "answer": "C"}, {"subject": "Raciocínio Lógico", "text": "A negação de “Todos os candidatos foram aprovados” é “Pelo menos um candidato não foi aprovado”.", "answer": "C"}, {"subject": "Raciocínio Lógico", "text": "Se uma proposição p é verdadeira, então sua negação ¬p é falsa.", "answer": "C"}, {"subject": "Raciocínio Lógico", "text": "A proposição composta “p e q” é verdadeira sempre que pelo menos uma das proposições p ou q for verdadeira.", "answer": "E"}, {"subject": "Raciocínio Lógico", "text": "Pelas Leis de Morgan, a negação de “p e q” é equivalente a “não p ou não q”.", "answer": "C"}, {"subject": "Raciocínio Lógico", "text": "Uma proposição condicional “Se p, então q” é falsa somente quando p é verdadeira e q é falsa.", "answer": "C"}, {"subject": "Raciocínio Lógico", "text": "Duas proposições equivalentes possuem os mesmos valores lógicos em todas as possibilidades de uma tabela-verdade.", "answer": "C"}, {"subject": "Raciocínio Lógico", "text": "Um argumento pode ser considerado válido mesmo que sua conclusão seja falsa em uma situação na qual todas as premissas sejam verdadeiras.", "answer": "E"}, {"subject": "Legislação Institucional", "text": "A Lei estadual nº 6.513/1995 integra o conteúdo de Legislação Institucional como Estatuto dos Policiais Militares do Estado do Maranhão.", "answer": "C"}, {"subject": "Legislação Institucional", "text": "A Lei Federal nº 14.751/2023 aparece no conteúdo programático como Lei Orgânica Nacional das Polícias Militares e dos Corpos de Bombeiros Militares.", "answer": "C"}, {"subject": "Legislação Institucional", "text": "A Lei nº 12.896/2026 aparece no conteúdo programático como Lei de Organização Básica da PMMA.", "answer": "C"}, {"subject": "Legislação Institucional", "text": "O conteúdo de Legislação Institucional do edital-base não inclui nenhuma norma estadual.", "answer": "E"}, {"subject": "Legislação Institucional", "text": "As alterações posteriores das normas indicadas no edital devem ser consideradas no estudo quando o conteúdo programático menciona expressamente “e suas alterações”.", "answer": "C"}, {"subject": "Legislação Institucional", "text": "O Estatuto dos Policiais Militares do Estado do Maranhão é apresentado no edital-base como uma lei federal.", "answer": "E"}, {"subject": "Noções de Informática", "text": "Windows e Linux são exemplos de sistemas operacionais mencionados no conteúdo programático.", "answer": "C"}, {"subject": "Noções de Informática", "text": "Programas de edição de textos, planilhas e apresentações integram o conteúdo de Noções de Informática.", "answer": "C"}, {"subject": "Noções de Informática", "text": "Computação em nuvem e armazenamento de dados na nuvem estão previstos no conteúdo programático.", "answer": "C"}, {"subject": "Noções de Informática", "text": "Firewall, antivírus e antispyware são ferramentas relacionadas à segurança da informação.", "answer": "C"}, {"subject": "Noções de Informática", "text": "Procedimentos de backup não fazem parte dos tópicos previstos em Segurança da Informação.", "answer": "E"}];let current=0,answers=Array(questions.length).fill(null);const $=id=>document.getElementById(id);
function render(){let q=questions[current];$("subject").textContent=q.subject;$("question").textContent=q.text;$("counter").textContent=`Questão ${current+1} de ${questions.length}`;$("answeredCount").textContent=answers.filter(Boolean).length+" respondidas";$("progress").style.width=((current+1)/questions.length*100)+"%";document.querySelectorAll(".option").forEach(b=>b.classList.toggle("selected",b.dataset.a===answers[current]));$("prev").disabled=current===0;$("prev").style.opacity=current===0?".45":"1";renderGrid()}
function renderGrid(){let g=$("grid");g.innerHTML="";questions.forEach((_,i)=>{let b=document.createElement("button");b.className="jump"+(answers[i]?" answered":"")+(i===current?" current":"");b.textContent=i+1;b.onclick=()=>{current=i;render()};g.appendChild(b)})}
document.querySelectorAll(".option").forEach(b=>b.onclick=()=>{answers[current]=b.dataset.a;render()});$("prev").onclick=()=>{if(current>0){current--;render()}};$("next").onclick=()=>{current=current<questions.length-1?current+1:0;render()};
$("finish").onclick=()=>{let h=0,m=0,bk=0,by={};questions.forEach((q,i)=>{let a=answers[i]||"B";by[q.subject]??={a:0,e:0,b:0};if(a==="B"){bk++;by[q.subject].b++}else if(a===q.answer){h++;by[q.subject].a++}else{m++;by[q.subject].e++}});let s=h-m;$("score").textContent=s+" pontos líquidos";$("hits").textContent=h;$("misses").textContent=m;$("blanks").textContent=bk;$("message").textContent=s>=45?"Excelente nível para este diagnóstico.":s>=35?"Bom nível, com alguns pontos a consolidar.":s>=20?"Nível intermediário: há base, mas ainda existem lacunas importantes.":"Diagnóstico inicial: priorize revisão teórica e treino de questões.";let x="<h3>Desempenho por matéria</h3>";Object.entries(by).forEach(([k,v])=>x+=`<div class="row"><span>${k}</span><strong>${v.a-v.e} pts • ${v.a}A / ${v.e}E / ${v.b}B</strong></div>`);$("bySubject").innerHTML=x;let r="<h3>Revisão das 60 questões</h3>";questions.forEach((q,i)=>{let a=answers[i]||"B",c=a==="B"?"blank":a===q.answer?"ok":"bad",l=a==="B"?"Em branco":a===q.answer?"Acertou":"Errou";r+=`<div class="review"><b>${i+1}. ${q.subject}</b><div class="q">${q.text}</div><span class="${c}"><b>${l}</b> — Sua resposta: ${a} | Gabarito: ${q.answer}</span></div>`});$("review").innerHTML=r;$("quiz").style.display="none";$("result").style.display="block";scrollTo(0,0)};
$("restart").onclick=()=>{current=0;answers=Array(questions.length).fill(null);$("result").style.display="none";$("quiz").style.display="block";render();scrollTo(0,0)};render();
